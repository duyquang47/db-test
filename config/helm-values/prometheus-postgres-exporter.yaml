# Prometheus PostgreSQL Exporter Configuration
# Multi-target support with SSL/Auth module support

# Service Monitor for Prometheus scraping
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prom-stack
  multipleTarget:
    enabled: false
    targets: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

replicas: 1

service:
  type: ClusterIP
  port: 9187

# Configuration
config:
  # Default database connection
  datasource_name: ""
  
  # PostgreSQL version
  pg_version: 14
  
  # Extra flags
  constantLabels: {}
  
  # Collectors
  disableDefaultMetrics: false

# Container image
image:
  repository: quay.io/prometheuscommunity/postgres-exporter
  tag: v0.16.0
  pullPolicy: IfNotPresent

# PostgreSQL auth modules configuration
# Will be merged with exporters targets from Terraform
postgres:
  multiTarget:
    enabled: false
    targets: []
