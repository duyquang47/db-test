serviceMonitor:
  enabled: true
  namespace: monitoring
  additionalLabels:
    release: kube-prom-stack
service:
  type: ClusterIP
  port: 9187
  targetPort: 9187
  name: http
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
