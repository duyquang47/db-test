# Blackbox Exporter Helm Values

replicaCount: 1

image:
  repository: quay.io/prometheus/blackbox-exporter
  tag: v0.25.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9115
  targetPort: 9115

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Blackbox configuration
config:
  modules:
    tcp_connect:
      prober: tcp
      timeout: 5s
    icmp:
      prober: icmp
      timeout: 5s
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []

# ServiceMonitor for Prometheus scraping
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
