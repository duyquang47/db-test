{{- if .Values.pushgateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgdsm.componentName" (dict "Release" .Release "component" "pushgateway") }}
  namespace: {{ include "pgdsm.monitoringNamespace" . }}
  labels:
    {{- include "pgdsm.componentLabels" (dict "root" . "component" "pushgateway") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pushgateway
  template:
    metadata:
      labels:
        {{- include "pgdsm.componentLabels" (dict "root" . "component" "pushgateway") | nindent 8 }}
    spec:
      containers:
        - name: pushgateway
          image: {{ .Values.images.pushgateway }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.pushgateway.service.port }}
              name: http
          resources:
            {{- toYaml .Values.pushgateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgdsm.componentName" (dict "Release" .Release "component" "pushgateway") }}
  namespace: {{ include "pgdsm.monitoringNamespace" . }}
  labels:
    {{- include "pgdsm.componentLabels" (dict "root" . "component" "pushgateway") | nindent 4 }}
spec:
  type: {{ .Values.pushgateway.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pushgateway
  ports:
    - name: http
      port: {{ .Values.pushgateway.service.port }}
      targetPort: http
{{- if .Values.pushgateway.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pgdsm.componentName" (dict "Release" .Release "component" "pushgateway") }}
  namespace: {{ include "pgdsm.monitoringNamespace" . }}
  labels:
    {{- include "pgdsm.componentLabels" (dict "root" . "component" "pushgateway") | nindent 4 }}
    {{- with .Values.pushgateway.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ include "pgdsm.monitoringNamespace" . }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pushgateway
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.pushgateway.serviceMonitor.interval }}
      honorLabels: true
{{- end }}
{{- end }}
