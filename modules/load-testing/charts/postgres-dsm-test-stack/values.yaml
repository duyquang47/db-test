testProfile: 2c4g

namespaceManagement:
  createMonitoring: true
  createLoadtest: true

namespaces:
  monitoring: monitoring
  loadtest: loadtest

images:
  blackboxExporter: quay.io/prometheus/blackbox-exporter:v0.25.0
  pgbench: postgres:17.5
  pushgateway: prom/pushgateway:v1.11.1
  metricsPusher: curlimages/curl:8.7.1
  dbClusterCollector: python:3.12-slim

postgres:
  host: REPLACE_DB_HOST
  port: 5432
  benchmarkDatabase: REPLACE_BENCHMARK_DATABASE
  sslmode: require
  pgbenchUser: REPLACE_PGBENCH_USER
  pgbenchPassword: REPLACE_PGBENCH_PASSWORD

blackboxExporter:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

loadtest:
  runner:
    enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi

pushgateway:
  enabled: true
  service:
    type: ClusterIP
    port: 9091
  serviceMonitor:
    enabled: true
    interval: 15s
    additionalLabels: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  pusher:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
      cpu: 100m
      memory: 128Mi

dbClusterMetrics:
  enabled: false
  kubeconfig: ""
  pollIntervalSeconds: 30
  targetName: ""
  targetHost: ""
  targetPort: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

grafanaDashboards:
  enabled: true
  checksum: ""

probes:
  enabled: false
  interval: 30s
  additionalLabels: {}
  targets: []

